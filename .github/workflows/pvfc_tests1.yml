name: Test set 1

on: [ push ]

jobs:
  flake8-lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: flake8 Lint
        uses: py-actions/flake8@v2
        with:
          ignore: "E265,E303,E501,W503,F824"
          max-line-length: "120"


  # actual code tests here
  tests:
    runs-on: ubuntu-latest
    name: Tests (pytest)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Run tests
        run: pytest tests/radiation_forecasting_tests.py -s